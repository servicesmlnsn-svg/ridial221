<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visite virtuelle</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
}

#panorama{
width:100%;
height:100vh;
}

/* MENU BAS */

.controls{

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:12px;

z-index:1000;

}

/* BOUTONS */

.control-btn{

width:45px;
height:45px;

border-radius:50%;

border:3px solid #7a0000;

background:white;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;

cursor:pointer;

color:#7a0000;

transition:0.2s;

}

.control-btn:hover{

background:#7a0000;
color:white;

}

/* MENU DROITE */

.scene-menu{

position:absolute;

top:120px;
right:20px;

display:flex;
flex-direction:column;

gap:10px;

}

.scene-menu button{

background:rgba(60,60,60,0.9);

color:white;

border:none;

padding:12px;

border-radius:10px;

cursor:pointer;

}

.scene-menu button:hover{

background:black;

}

/* FLECHE NAVIGATION */

.arrow{

width:70px;
height:70px;

background:url("https://cdn-icons-png.flaticon.com/512/892/892692.png");

background-size:contain;

background-repeat:no-repeat;

cursor:pointer;

}

</style>

</head>

<body>

<div id="panorama"></div>

<!-- MENU SCENES -->

<div class="scene-menu">

<button onclick="viewer.loadScene('exterieur')">Extérieur</button>

<button onclick="viewer.loadScene('entree')">Entrée</button>

<button onclick="viewer.loadScene('jardin')">Jardin</button>

<button onclick="viewer.loadScene('parking')">Parking</button>

</div>

<!-- MENU BAS -->

<div class="controls">

<div class="control-btn" onclick="zoomIn()">+</div>

<div class="control-btn" onclick="zoomOut()">−</div>

<div class="control-btn" onclick="viewer.setPitch(viewer.getPitch()+10)">↑</div>

<div class="control-btn" onclick="viewer.setPitch(viewer.getPitch()-10)">↓</div>

<div class="control-btn" onclick="viewer.setYaw(viewer.getYaw()-10)">←</div>

<div class="control-btn" onclick="viewer.setYaw(viewer.getYaw()+10)">→</div>

<div class="control-btn" onclick="viewer.toggleFullscreen()">⛶</div>

</div>

<script>

var viewer = pannellum.viewer('panorama',{

"default":{

"firstScene":"exterieur",

"autoLoad":true,

"compass":true,

"showControls":false

},

"scenes":{

"exterieur":{

"type":"equirectangular",

"panorama":"https://i.imgur.com/skCv9Y3.jpg",

"hotSpots":[

{

"pitch":-10,

"yaw":0,

"type":"scene",

"sceneId":"entree",

"cssClass":"arrow"

}

]

},

"entree":{

"type":"equirectangular",

"panorama":"https://i.imgur.com/QpGnLzK.jpg",

"hotSpots":[

{

"pitch":-10,

"yaw":180,

"type":"scene",

"sceneId":"exterieur",

"cssClass":"arrow"

}

]

}

}

});

function zoomIn(){

viewer.setHfov(viewer.getHfov()-10)

}

function zoomOut(){

viewer.setHfov(viewer.getHfov()+10)

}

</script>

</body>

</html>

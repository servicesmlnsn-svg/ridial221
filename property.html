<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail Propriété</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>

body{
font-family: Arial;
margin:0;
}

#panorama{
width:100%;
height:500px;
opacity:1;
transition: opacity 0.8s ease;
}

.fade-out{
opacity:0;
}

.nav360{
text-align:center;
margin-top:20px;
}

.nav360 button{
padding:12px 25px;
font-size:16px;
margin:5px;
cursor:pointer;
border:none;
background:#0c3c60;
color:white;
border-radius:6px;
}

.nav360 button:hover{
background:#08293f;
}

</style>

</head>

<body>

<header>
<h1>Villa Moderne - Dakar</h1>

<nav>
<a href="index.html">Accueil</a>
<a href="properties.html">Propriétés</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section>

<h2>Visite Virtuelle 360°</h2>

<div id="panorama"></div>

<div class="nav360">
<button onclick="changerScene('scene1')">Salon</button>
<button onclick="changerScene('scene2')">Terrasse</button>
</div>

</section>

<script>

var viewer = pannellum.viewer('panorama', {

"default": {
"firstScene": "scene1",
"autoLoad": true
},

"scenes": {

"scene1": {
"type": "equirectangular",
"panorama": "https://i.imgur.com/skCv9Y3.jpg"
},

"scene2": {
"type": "equirectangular",
"panorama": "https://i.imgur.com/QpGnLzK.jpg"
}

}

});

function changerScene(scene){

var pano = document.getElementById("panorama");

pano.classList.add("fade-out");

setTimeout(function(){

viewer.loadScene(scene);

pano.classList.remove("fade-out");

},800);

}

</script>

</body>
</html>
